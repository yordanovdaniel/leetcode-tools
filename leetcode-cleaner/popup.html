<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #ffa116;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }
    .toggle {
      position: relative;
      width: 42px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    input:checked + .slider {
      background: #ffa116;
    }
    input:checked + .slider::before {
      transform: translateX(20px);
    }
    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      color: #888;
    }
    .status span { font-weight: 600; }
    .status .on { color: #4caf50; }
    .status .off { color: #f44336; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="icon">
    <h1>LeetCode Cleaner</h1>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Auto-reset code</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <p class="status" id="status">Status: <span class="on">Active</span></p>
  <script src="popup.js"></script>
</body>
</html>
